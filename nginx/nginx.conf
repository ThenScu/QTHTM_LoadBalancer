worker_processes  1;

events { worker_connections  1024; }

http {
  # DNS resolver nội bộ của Docker để nginx có thể resolve tên service
  resolver 127.0.0.11 ipv6=off valid=10s;

  # [Tính mới] KHAI BÁO VÙNG NHỚ 
  # limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

  # upstream 2 backend - Load balancing với Sticky Session
  upstream web_backend {
    # ip_hash: Cùng IP -> cùng backend -> Session được giữ lại
    ip_hash;
    
    # Round-robin: phân phối requests 50-50 giữa WEB1 và WEB2
    server web1:80 max_fails=2 fail_timeout=5s weight=1;
    server web2:80 max_fails=2 fail_timeout=5s weight=1;
    
    # Keepalive connection pooling
    keepalive 32;

  }

  server {
    listen 80;

    # [Tính mới] THIẾT LẬP LUẬT BẢO VỆ 
    # limit_req zone=mylimit burst=20 nodelay;

    location / {
      proxy_pass http://web_backend;

      # Headers cho backend
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
      
      # HTTP version cho connection reuse
      proxy_http_version 1.1;

      # Failover strategy: nếu backend lỗi -> thử backend khác
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 2;
      proxy_next_upstream_timeout 3s;
      
      # Timeout settings
      proxy_connect_timeout 2s;
      proxy_read_timeout 10s;
      proxy_send_timeout 10s;
    }
  }
}
